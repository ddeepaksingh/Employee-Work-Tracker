{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — {{ company_settings.company_name }}</title>
  <!-- Bootstrap 5 CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <!-- Custom CSS -->
  <link rel="stylesheet" href="{% static 'css/style.css' %}" />
</head>
<body class="auth-page">

  <div class="auth-card shadow-lg">
    <div class="auth-logo">
      <i class="bi bi-shield-lock-fill"></i>
    </div>
    <h1 class="auth-title">Reset Password</h1>
    <p class="auth-subtitle">Enter your email address to receive instructions to reset your password</p>

    {% if form.email.errors %}
      <div class="alert alert-danger" role="alert">
        {{ form.email.errors|first }}
      </div>
    {% endif %}

    <form method="post" data-loading>
      {% csrf_token %}
      
      <div class="mb-4">
        <label for="id_email" class="form-label">Email Address</label>
        <input type="email" name="email" id="id_email" class="form-control form-control-lg" placeholder="name@company.com" required autofocus />
      </div>

      <button type="submit" class="btn btn-primary btn-lg w-100 py-2.5 mb-3">
        Send Reset Link
      </button>

      <div class="text-center">
        <a href="{% url 'accounts:login' %}" class="text-decoration-none small" style="color: var(--primary); font-weight: 500;">
          <i class="bi bi-arrow-left me-1"></i> Back to Sign In
        </a>
      </div>
    </form>
  </div>

  <!-- Loading Overlay -->
  <div id="loading-overlay">
    <div class="text-center text-white">
      <div class="spinner-border mb-3" role="status" style="width: 3rem; height: 3rem; border-width: 4px;"></div>
      <div class="fw-500">Sending email...</div>
    </div>
  </div>

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Custom JS -->
  <script src="{% static 'js/app.js' %}"></script>
</body>
</html>

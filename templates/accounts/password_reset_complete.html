{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Successful — {{ company_settings.company_name }}</title>
  <!-- Bootstrap 5 CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <!-- Custom CSS -->
  <link rel="stylesheet" href="{% static 'css/style.css' %}" />
</head>
<body class="auth-page">

  <div class="auth-card shadow-lg text-center">
    <div class="auth-logo bg-success" style="background: linear-gradient(135deg, var(--success), #27ae60) !important;">
      <i class="bi bi-patch-check-fill"></i>
    </div>
    <h1 class="auth-title">Password Reset Complete</h1>
    <p class="auth-subtitle mt-2">
      Your password has been successfully reset. You can now log in to your account.
    </p>

    <a href="{% url 'accounts:login' %}" class="btn btn-primary w-100 py-2.5 mt-3">
      Sign In Now
    </a>
  </div>

</body>
</html>
